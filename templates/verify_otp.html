{% extends "base.html" %}
{% block content %}

<div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;">
    <div class="card" style="width: 100%; max-width: 420px; background: rgba(30,41,59,0.95); border: 1px solid rgba(255,255,255,0.1);">
        
        <!-- Header -->
        <div style="text-align: center; padding-bottom: 25px; border-bottom: 1px solid rgba(255,255,255,0.1);">
            <h1 style="font-size: 32px; margin: 0 0 10px 0;">✉️ Verify Email</h1>
            <p style="color: #94a3b8; margin: 0;">Enter the 6-digit code sent to<br><strong>{{ email }}</strong></p>
        </div>

        <!-- Form -->
        <form method="POST" style="padding: 25px 0;">
            
            <!-- OTP Input -->
            <div style="margin-bottom: 20px;">
                <label style="display: block; color: #e2e8f0; font-weight: 600; margin-bottom: 8px;">
                    🔐 Verification Code
                </label>
                <input 
                    type="text" 
                    name="otp" 
                    required 
                    maxlength="6"
                    inputmode="numeric"
                    placeholder="000000"
                    pattern="[0-9]{6}"
                    style="width: 100%; padding: 16px 15px; border: 2px solid rgba(255,255,255,0.2); 
                           border-radius: 8px; background: rgba(255,255,255,0.05); color: #e2e8f0;
                           font-size: 24px; letter-spacing: 8px; text-align: center; font-weight: bold;
                           transition: 0.3s; font-family: 'Courier New', monospace;"
                    onfocus="this.style.borderColor='#667eea'; this.style.background='rgba(102,126,234,0.1)'"
                    onblur="this.style.borderColor='rgba(255,255,255,0.2)'; this.style.background='rgba(255,255,255,0.05)'"
                >
                <p style="color: #64748b; font-size: 12px; margin: 5px 0 0 0;">
                    ⏱️ Code valid for 30 minutes
                </p>
            </div>

            <!-- Submit Button -->
            <button 
                type="submit" 
                style="width: 100%; padding: 12px; background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
                       color: white; border: none; border-radius: 8px; font-weight: 600; 
                       font-size: 16px; cursor: pointer; transition: 0.3s; margin-bottom: 15px;"
                onmouseover="this.style.boxShadow='0 5px 15px rgba(102,126,234,0.4)'"
                onmouseout="this.style.boxShadow='none'"
            >
                ✅ Verify Code
            </button>

            <!-- Actions -->
            <div style="display: flex; gap: 10px; font-size: 12px;">
                <a href="{{ url_for('auth.forgot_password') }}" 
                   style="flex: 1; color: #64748b; text-decoration: none; padding: 10px; 
                          border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; 
                          text-align: center; transition: 0.3s;"
                   onmouseover="this.style.background='rgba(255,255,255,0.05)'; this.style.color='#e2e8f0'"
                   onmouseout="this.style.background='transparent'; this.style.color='#64748b'"
                >
                    🔄 Request New Code
                </a>
                <a href="{{ url_for('auth.login') }}" 
                   style="flex: 1; color: #64748b; text-decoration: none; padding: 10px; 
                          border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; 
                          text-align: center; transition: 0.3s;"
                   onmouseover="this.style.background='rgba(255,255,255,0.05)'; this.style.color='#e2e8f0'"
                   onmouseout="this.style.background='transparent'; this.style.color='#64748b'"
                >
                    ← Back to Login
                </a>
            </div>

        </form>

        <!-- Info Box -->
        <div style="background: rgba(34,197,94,0.1); border-left: 4px solid #22c55e; padding: 15px; 
                   border-radius: 0 8px 8px 0; margin-top: 20px;">
            <p style="color: #22c55e; font-size: 13px; margin: 0;">
                <strong>💡 Didn't receive the code?</strong>
            </p>
            <p style="color: #cbd5e1; font-size: 12px; margin: 5px 0 0 0;">
                • Check your spam folder<br>
                • Click "Request New Code" to send another OTP
            </p>
        </div>

    </div>
</div>

<style>
    .card {
        padding: 40px;
        border-radius: 16px;
        backdrop-filter: blur(10px);
    }
    
    input {
        box-sizing: border-box;
    }
    
    button:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }
</style>

<script>
    // Auto-format OTP input
    const otpInput = document.querySelector('input[name="otp"]');
    otpInput.addEventListener('input', function() {
        // Remove non-numeric characters
        this.value = this.value.replace(/[^0-9]/g, '');
        // Limit to 6 digits
        if (this.value.length > 6) {
            this.value = this.value.slice(0, 6);
        }
    });
</script>

{% endblock %}
