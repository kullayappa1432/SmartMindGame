{% extends "base.html" %}
{% block content %}

<style>
.admin-header {
    text-align: center;
    margin-bottom: 40px;
    padding: 30px;
    background: linear-gradient(135deg, #1e293b, #0f172a);
    border-radius: 10px;
}

.admin-header h1 {
    margin: 0;
    font-size: 36px;
    background: linear-gradient(90deg, #38bdf8, #22c55e);
    -webkit-background-clip: text;
    color: transparent;
}

.stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    margin-bottom: 40px;
}

.stat-card {
    background: #1e293b;
    padding: 20px;
    border-radius: 10px;
    text-align: center;
    border: 1px solid #334155;
}

.stat-card h3 {
    margin: 0;
    color: #94a3b8;
    font-size: 14px;
    text-transform: uppercase;
}

.stat-card .number {
    font-size: 36px;
    font-weight: bold;
    color: #38bdf8;
    margin: 10px 0;
}

.admin-links {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 15px;
}

.admin-links a {
    display: block;
    padding: 20px;
    background: linear-gradient(135deg, #1e293b, #0f172a);
    border: 1px solid #334155;
    border-radius: 10px;
    text-decoration: none;
    color: #38bdf8;
    font-weight: bold;
    text-align: center;
    transition: all 0.3s;
}

.admin-links a:hover {
    background: linear-gradient(135deg, #334155, #1e293b);
    border-color: #38bdf8;
    transform: translateY(-5px);
}
</style>

<div class="admin-header">
    <h1>👑 Admin Dashboard</h1>
    <p>System Control Panel</p>
</div>

<div class="stats-grid">
    <div class="stat-card">
        <h3>Total Users</h3>
        <div class="number">{{ stats.total_users }}</div>
    </div>
    <div class="stat-card">
        <h3>Admin Users</h3>
        <div class="number">{{ stats.admin_users }}</div>
    </div>
    <div class="stat-card">
        <h3>Recent Activity</h3>
        <div class="number">{{ stats.recent_activity }}</div>
    </div>
</div>

<h2 style="margin-top: 40px; margin-bottom: 20px;">Management Tools</h2>

<div class="admin-links">
    <a href="/admin/users">👥 User Management</a>
    <a href="/admin/settings">⚙️ System Settings</a>
    <a href="/admin/logs">📝 Activity Logs</a>
</div>

{% endblock %}
